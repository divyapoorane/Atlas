    content: '';

    display: inline-block;
    width: 6px; height: 6px;
    background: #10b981;
    border-radius: 50%;
    margin: 0 2px;
    animation: wave 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }

  .tooltip:hover::after {
    content: attr(data-tip);

    bottom: 100%; left: 50%;
    transform: translateX(-50%);

    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 100;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 6px;

const AuthScreen = ({ onComplete }) => {
  const [mode, setMode] = useState('login'); // login, register, forgot, otp
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');

  const passwordStrength = useMemo(() => {
    let s = 0;
    if (password.length >= 8) s++;
    if (/[A-Z]/.test(password)) s++;
    if (/[0-9]/.test(password)) s++;
    if (/[^A-Za-z0-9]/.test(password)) s++;
    return s;
  }, [password]);

  return (
    <div className="min-h-screen bg-midnight-950 relative overflow-hidden flex items-center justify-center p-6">
      <div className="absolute inset-0 gradient-mesh"></div>
      <div className="absolute inset-0 grid-bg opacity-30"></div>
      <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald/10 rounded-full blur-3xl"></div>
      <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-gold/5 rounded-full blur-3xl"></div>

      <div className="relative z-10 w-full max-w-md">
        <div className="flex items-center gap-2 mb-8 justify-center">
          <div className="w-10 h-10 rounded-xl gradient-emerald flex items-center justify-center shadow-glow-emerald">
            <Icon name="gem" size={22} className="text-white" />
          </div>
          <span className="text-2xl font-bold">Atlas</span>
        </div>

        <div className="glass-strong rounded-2xl p-8 shadow-premium">
          <div className="mb-6">

              {mode === 'register' && 'Create your account'}
              {mode === 'forgot' && 'Reset password'}
              {mode === 'otp' && 'Verify your email'}

            <p className="text-sm text-gray-400">

              {mode === 'register' && 'Start your journey to financial mastery'}
              {mode === 'forgot' && 'We\'ll send you a reset link'}
              {mode === 'otp' && `Code sent to ${email || 'your email'}`}

            <div>

                {[0,1,2,3,4,5].map(i => (
                  <input key={i} type="text" maxLength="1" className="w-12 h-14 text-center text-xl font-bold rounded-lg bg-midnight-800 border border-white/10 focus:border-emerald" />

            <div className="space-y-4">

                <div>
                  <label className="text-xs text-gray-400 mb-1.5 block">Full name</label>

                    <Icon name="user" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" />
                    <input value={name} onChange={e=>setName(e.target.value)} type="text" placeholder="John Doe" className="w-full pl-10 pr-4 py-3 rounded-xl text-sm"/>

              {mode !== 'forgot' && (

                    <div className="mt-2">
                      <div className="flex gap-1 mb-1">
                        {[0,1,2,3].map(i => (
                          <div key={i} className={`h-1 flex-1 rounded-full ${i < passwordStrength ? (passwordStrength <= 1 ? 'bg-red-500' : passwordStrength <= 2 ? 'bg-yellow-500' : passwordStrength <= 3 ? 'bg-blue-500' : 'bg-emerald') : 'bg-white/5'}`}></div>
                        ))}
                      </div>
                      <div className="text-xs text-gray-400">

                {mode === 'login' && 'Sign in to Atlas'}

                <span className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-midnight-900 px-3 text-xs text-gray-500">OR</span>

              <button className="w-full btn-ghost text-gray-200 font-medium py-3 rounded-xl flex items-center justify-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" opacity=".7" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/></svg>
                Continue with Google
              </button>

              <div className="text-center text-sm text-gray-400 pt-2">
                {mode === 'login' && <>New to Atlas? <span onClick={() => setMode('register')} className="text-emerald cursor-pointer">Create account</span></>}

                {mode === 'forgot' && <><span onClick={() => setMode('login')} className="text-emerald cursor-pointer">← Back to sign in</span></>}

            </div>
          )}

        <div className="text-center text-xs text-gray-500 mt-6">

const App = () => {

  const [current, setCurrent] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);

  const pageConfig = {
    dashboard: { title: 'Dashboard', subtitle: 'Your financial command center', component: Dashboard },
    finn: { title: 'Finn AI Advisor', subtitle: 'Your AI financial companion', component: FinnAdvisor },
    agents: { title: 'Multi-Agent Panel', subtitle: '9 specialized agents at work', component: AgentsPanel },
    profile: { title: 'Financial Profile', subtitle: 'Your complete financial identity', component: Profile },
    budget: { title: 'Budget Planner', subtitle: 'Track and optimize your spending', component: BudgetPlanner },
    expenses: { title: 'Expense Tracker', subtitle: 'Every rupee accounted for', component: ExpenseTracker },
    income: { title: 'Income Manager', subtitle: 'All your income sources', component: IncomeManager },
    loans: { title: 'Loan Analyzer', subtitle: 'AI-powered loan analysis', component: LoanAnalyzer },
    investments: { title: 'Investment Planner', subtitle: 'Grow your wealth intelligently', component: InvestmentPlanner },
    insurance: { title: 'Insurance Analysis', subtitle: 'Coverage review & recommendations', component: Insurance },
    tax: { title: 'Tax Planner', subtitle: 'Optimize your tax liability', component: TaxPlanner },
    goals: { title: 'Goal Planner', subtitle: 'Achieve your financial dreams', component: Goals },
    reports: { title: 'Financial Reports', subtitle: 'Comprehensive insights', component: Reports },
    documents: { title: 'Documents', subtitle: 'Secure document management', component: Documents },
    notifications: { title: 'Notifications', subtitle: 'Stay updated', component: Notifications },
    calendar: { title: 'Calendar', subtitle: 'Financial events & deadlines', component: Calendar },
    support: { title: 'Support', subtitle: 'We\'re here to help', component: Support },
    settings: { title: 'Settings', subtitle: 'Customize your experience', component: Settings },
  };

  const Page = pageConfig[current].component;

  if (view === 'landing') return <LandingPage onEnter={() => setView('auth')} />;
  if (view === 'auth') return <AuthScreen onComplete={() => setView('onboarding')} />;
  if (view === 'onboarding') return <Onboarding onComplete={() => setView('app')} />;

  return (
    <div className="min-h-screen bg-midnight-950 flex">
      <div className="absolute inset-0 gradient-mesh opacity-30 pointer-events-none"></div>
      <Sidebar current={current} setCurrent={setCurrent} collapsed={collapsed} setCollapsed={setCollapsed} />
      <main className="flex-1 relative min-w-0">
        <TopBar title={pageConfig[current].title} subtitle={pageConfig[current].subtitle} />
        <Page />
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
