<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atlas Financial Intelligence</title>
    <!-- We will use standard CSS for styling instead of Tailwind's script -->
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 250px; border-right: 1px solid #333; padding: 20px; }
        .main { flex: 1; padding: 40px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .text-emerald { color: #10b981; }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h1 style="color: #10b981;">ATLAS</h1>
            <p>Dashboard</p>
            <p>Profile</p>
            <p>Finn AI</p>
        </div>
        <div class="main">
            <h2>Financial Overview</h2>
            <div class="grid">
                <div class="card">
                    <p>Net Worth</p>
                    <h3 style="font-size: 24px;">₹1,24,50,000</h3>
                </div>
                <div class="card">
                    <p>Health Score</p>
                    <h3 style="font-size: 24px;">88/100</h3>
                </div>
                <div class="card">
                    <p>Growth</p>
                    <h3 style="font-size: 24px;" class="text-emerald">+12.4%</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- We will skip React for a moment just to see the page render -->
    <script>
        console.log("Atlas is running natively.");
    </script>
</body>
</html>
