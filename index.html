<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Financial Intelligence</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0A0A0A] text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LayoutDashboard, Wallet, TrendingUp, ShieldCheck, Landmark, Receipt, Bot, Settings, Search, Bell } = lucide;

        function App() {
            const [activeView, setActiveView] = useState('dashboard');

            const menuItems = [
                { id: 'dashboard', icon: LayoutDashboard, label: 'Dashboard' },
                { id: 'profile', icon: Wallet, label: 'Financial Profile' },
                { id: 'budget', icon: Receipt, label: 'Budget Planner' },
                { id: 'investments', icon: TrendingUp, label: 'Investment Planner' },
                { id: 'loans', icon: Landmark, label: 'Loan Analyzer' },
                { id: 'insurance', icon: ShieldCheck, label: 'Insurance' },
                { id: 'finn', icon: Bot, label: 'Finn AI Advisor' },
                { id: 'settings', icon: Settings, label: 'Settings' },
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 border-r border-slate-800 bg-[#0A0A0A] flex flex-col">
                        <div className="p-6 text-xl font-bold text-white flex items-center gap-2">
                            <div className="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center text-emerald-400">A</div>
                            ATLAS
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            {menuItems.map((item) => (
                                <button key={item.id} onClick={() => setActiveView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${activeView === item.id ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'hover:bg-slate-900 text-slate-400'}`}>
                                    <item.icon size={18} />
                                    <span className="text-sm font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 flex flex-col overflow-y-auto">
                        <header className="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-[#0A0A0A]/80 backdrop-blur">
                            <h2 className="text-lg font-semibold text-white capitalize">{activeView}</h2>
                            <div className="flex items-center gap-4">
                                <Search size={18} className="text-slate-500" />
                                <Bell size={18} className="text-slate-500" />
                                <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-emerald-500 to-blue-500"></div>
                            </div>
                        </header>
                        <div className="p-8">
                            {activeView === 'dashboard' ? <Dashboard /> : <div className="text-slate-500 italic">Module: {activeView} loading...</div>}
                        </div>
                    </main>
                </div>
            );
        }

        function Dashboard() {
            return (
                <div className="space-y-6 animate-in fade-in duration-700">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        {[ 
                            { label: 'Net Worth', val: '₹1,24,50,000' }, 
                            { label: 'Monthly Income', val: '₹8,50,000' }, 
                            { label: 'Total Debt', val: '₹42,00,000' }, 
                            { label: 'Health Score', val: '88/100' } 
                        ].map((stat, i) => (
                            <div key={i} className="p-6 rounded-2xl bg-[#121212] border border-slate-800 shadow-xl">
                                <p className="text-slate-500 text-xs uppercase tracking-widest mb-2">{stat.label}</p>
                                <h3 className="text-2xl font-semibold text-white">{stat.val}</h3>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
